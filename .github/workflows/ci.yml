name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test on ${{ matrix.machine_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            machine_name: linux x64
            build_dir: build_Debug
            llvm_install: sudo apt-get update && sudo apt-get install -y ccache clang clang-format clang-tidy cmake llvm-dev ninja-build
            extra_cmake_args: -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            use_ccache: true
            use_package_cache: false
            enable_llvm: true
          - os: macos-latest
            machine_name: macOS arm64
            build_dir: build_Debug
            llvm_install: brew update && brew install ccache llvm ninja
            extra_cmake_args: -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            use_ccache: true
            use_package_cache: true
            package_cache_path: ~/Library/Caches/Homebrew
            enable_llvm: true
          - os: macos-15-intel
            machine_name: macOS intel
            build_dir: build_Debug
            llvm_install: brew update && brew install ccache llvm ninja
            extra_cmake_args: -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            use_ccache: true
            use_package_cache: true
            package_cache_path: ~/Library/Caches/Homebrew
            enable_llvm: true
          - os: ubuntu-24.04-arm
            machine_name: linux arm64
            build_dir: build_Debug
            llvm_install: sudo apt-get update && sudo apt-get install -y ccache clang clang-format clang-tidy cmake llvm-dev ninja-build
            extra_cmake_args: -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            use_ccache: true
            use_package_cache: false
            enable_llvm: true
          - os: windows-latest
            machine_name: windows x64
            build_dir: build_Debug
            llvm_install: ''
            extra_cmake_args: -DLLVM_LANG_ENABLE_LLVM=OFF
            use_ccache: false
            use_package_cache: true
            package_cache_path: |
              C:\ProgramData\chocolatey\cache
              C:\ProgramData\chocolatey\lib
            enable_llvm: false

    runs-on: ${{ matrix.os }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore package cache
        if: matrix.use_package_cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.package_cache_path }}
          key: ${{ runner.os }}-packages-${{ github.job }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-packages-${{ github.job }}-

      - name: Install toolchain
        if: matrix.llvm_install != ''
        shell: bash
        run: ${{ matrix.llvm_install }}

      - name: Restore ccache
        if: matrix.use_ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ github.job }}-${{ hashFiles('CMakeLists.txt', '.clang-tidy', '.clang-format', 'src/**/*.cpp', 'include/**/*.h', 'test/**/*.cpp') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.job }}-

      - name: Add LLVM to PATH on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Resolve LLVM CMake path on Windows
        if: runner.os == 'Windows' && matrix.enable_llvm
        shell: pwsh
        run: |
          $clang = (Get-Command clang).Source
          $llvmRoot = Split-Path (Split-Path $clang -Parent) -Parent
          $llvmCmakeDir = Join-Path $llvmRoot 'lib\cmake\llvm'
          "LLVM_CMAKE_DIR=$llvmCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve LLVM CMake path
        if: runner.os != 'Windows' && matrix.enable_llvm
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "LLVM_CMAKE_DIR=$(brew --prefix llvm)/lib/cmake/llvm" >> "$GITHUB_ENV"
          else
            echo "LLVM_CMAKE_DIR=$(llvm-config --cmakedir)" >> "$GITHUB_ENV"
          fi

      - name: Show tool versions
        shell: bash
        run: |
          cmake --version
          clang --version
          clang-format --version
          clang-tidy --version
          if [ "${{ matrix.enable_llvm }}" != "true" ]; then
            echo "LLVM integration disabled for this runner"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            printf 'LLVM_DIR=%s\n' "$LLVM_CMAKE_DIR"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            "$(brew --prefix llvm)/bin/llvm-config" --version
          else
            llvm-config --version
          fi
          if command -v ccache >/dev/null 2>&1; then
            ccache --version
          fi

      - name: Configure
        shell: bash
        run: |
          llvm_args=""
          if [ "${{ matrix.enable_llvm }}" = "true" ]; then
            llvm_args="-DLLVM_DIR=${LLVM_CMAKE_DIR}"
          fi
          cmake -S . -B "${{ matrix.build_dir }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            ${llvm_args} \
            -DLLVM_LANG_ENABLE_CLANG_TIDY=ON \
            ${{ matrix.extra_cmake_args }}

      - name: Build
        shell: bash
        run: cmake --build "${{ matrix.build_dir }}"

      - name: Test
        shell: bash
        run: ctest --test-dir "${{ matrix.build_dir }}" --output-on-failure --no-tests=ignore --progress --verbose

      - name: Show ccache stats
        if: always() && matrix.use_ccache
        shell: bash
        run: ccache --show-stats

  lint-and-format-check:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy cmake llvm-dev ninja-build

      - name: Resolve LLVM CMake path
        shell: bash
        run: echo "LLVM_CMAKE_DIR=$(llvm-config --cmakedir)" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build_Debug -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLLVM_DIR="${LLVM_CMAKE_DIR}" \
            -DLLVM_LANG_ENABLE_CLANG_TIDY=ON

      - name: Lint
        shell: bash
        run: cmake --build build_Debug

      - name: Check formatting
        shell: bash
        run: |
          files=$(git ls-files '*.cpp' '*.h' '*.hpp' '*.cc' '*.cxx')
          if [ -n "$files" ]; then
            clang-format --dry-run --Werror $files
          fi
